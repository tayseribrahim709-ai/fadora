<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6F61"/>
      <stop offset="100%" stop-color="#009688"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Circle background with gradient -->
  <circle cx="100" cy="100" r="98" fill="url(#g)" filter="url(#s)"/>

  <!-- Inner lighter ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Stylized F letter -->
  <g fill="white">
    <!-- Main vertical stem -->
    <rect x="78" y="45" width="16" height="115" rx="7"/>
    <!-- Top horizontal bar -->
    <rect x="78" y="45" width="60" height="16" rx="7"/>
    <!-- Middle horizontal bar -->
    <rect x="78" y="92" width="48" height="14" rx="7"/>
  </g>

  <!-- Decorative diamond dot -->
  <polygon points="100,172 108,180 100,188 92,180" fill="rgba(255,255,255,0.4)"/>

  <!-- Small decorative dots -->
  <circle cx="55" cy="72" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="150" cy="72" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="55" cy="125" r="3.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="150" cy="125" r="3.5" fill="rgba(255,255,255,0.25)"/>
</svg>
