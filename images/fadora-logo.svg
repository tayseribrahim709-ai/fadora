<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6F61"/>
      <stop offset="100%" stop-color="#009688"/>
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E85A4F"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF5F3"/>
      <stop offset="100%" stop-color="#E0F2F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <rect width="400" height="400" rx="40" fill="url(#bgGrad)"/>

  <!-- Main emblem - shield shape with gradient -->
  <path d="M200 30 C260 30 310 70 330 130 C350 190 340 260 300 310 C260 360 220 380 200 390 C180 380 140 360 100 310 C60 260 50 190 70 130 C90 70 140 30 200 30Z"
        fill="url(#primaryGrad)" filter="url(#shadow)"/>

  <!-- Inner lighter shield -->
  <path d="M200 55 C248 55 288 88 305 138 C322 188 312 248 278 292 C244 336 212 352 200 360 C188 352 156 336 122 292 C88 248 78 188 95 138 C112 88 152 55 200 55Z"
        fill="url(#secondaryGrad)" opacity="0.15"/>

  <!-- Decorative border ring -->
  <circle cx="200" cy="185" r="82" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Stylized F letter -->
  <g filter="url(#glow)">
    <!-- Main F stem -->
    <rect x="168" y="120" width="18" height="130" rx="4" fill="white"/>
    <!-- F top bar -->
    <rect x="168" y="120" width="60" height="14" rx="4" fill="white"/>
    <!-- F middle bar -->
    <rect x="168" y="160" width="48" height="12" rx="4" fill="white"/>
  </g>

  <!-- Decorative diamond accent -->
  <polygon points="200,255 210,268 200,281 190,268" fill="rgba(255,255,255,0.5)"/>

  <!-- Decorative dots -->
  <circle cx="155" cy="160" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="245" cy="160" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="155" cy="200" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="245" cy="200" r="3" fill="rgba(255,255,255,0.3)"/>

  <!-- FADORA text -->
  <text x="200" y="336" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="36" font-weight="800" letter-spacing="6" fill="url(#primaryGrad)">
    FADORA
  </text>

  <!-- Tagline in Arabic -->
  <text x="200" y="365" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="16" font-weight="400" letter-spacing="2" fill="#5C5C6E" opacity="0.8">
    صُنع بكل حب
  </text>

  <!-- Small decorative line under emblem -->
  <line x1="160" y1="295" x2="240" y2="295" stroke="url(#primaryGrad)" stroke-width="1.5" opacity="0.4"/>
</svg>
