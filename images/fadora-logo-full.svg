<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6F61"/>
      <stop offset="100%" stop-color="#009688"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <rect width="400" height="400" rx="30" fill="#FFF5F3"/>

  <!-- Icon circle -->
  <circle cx="200" cy="140" r="80" fill="url(#g)" filter="url(#s)"/>
  <circle cx="200" cy="140" r="66" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- F letter -->
  <g fill="white">
    <rect x="183" y="85" width="12" height="90" rx="5"/>
    <rect x="183" y="85" width="44" height="12" rx="5"/>
    <rect x="183" y="122" width="36" height="11" rx="5"/>
  </g>

  <!-- FADORA -->
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="32" font-weight="800" letter-spacing="5" fill="url(#g)">
    FADORA
  </text>

  <!-- Tagline -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="15" fill="#5C5C6E" opacity="0.7">صُنع بكل حب</text>

  <!-- Decorative line -->
  <line x1="125" y1="305" x2="275" y2="305" stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>
</svg>
